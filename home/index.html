<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <meta name="description" content="一个飞行员的个人主页" />
  <meta name="theme-color" content="#000" />
  <title>楸林の主页</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://s1.hdslb.com/bfs/static/jinkela/long/font/regular.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    body{font-family:'HarmonyOS Sans','Noto Serif SC',sans-serif;color:#fff;-webkit-font-smoothing:antialiased}

    /* ===== BG ===== */
    .bg{position:fixed;inset:0;z-index:0;background:url('/bg.jpg') center/cover no-repeat}
    .bg::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.5)}
    #rain{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
    .drop{position:absolute;background:linear-gradient(180deg,transparent,rgba(180,190,220,0.45));border-radius:0 0 2px 2px;animation:drop linear infinite}
    @keyframes drop{from{transform:translateY(-10vh)}to{transform:translateY(110vh)}}

    /* ===== Card ===== */
    .card{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.12);border-radius:12px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:background .3s,border-color .3s}
    .card:hover{background:rgba(255,255,255,0.22);border-color:rgba(255,255,255,0.18)}

    /* ===== Layout ===== */
    .page{position:relative;z-index:2;display:flex;justify-content:center;align-items:center;height:100vh;padding:30px 40px}
    .left{width:50%;padding-left:0;padding-right:5px}
    .right{width:42%;padding-top:70px;margin-left:-107px}

    /* ===== LEFT ===== */
    .logo-row{display:flex;align-items:center}
    .logo-row img{width:120px;border-radius:50%;filter:brightness(0) invert(1)}
    .logo-name{padding-left:22px;transform:translateY(-8px)}
    .logo-name .big{font-family:'Pacifico',cursive;font-size:5rem;line-height:1}
    .logo-name .sm{font-family:'Pacifico',cursive;font-size:2rem;margin-left:6px}

    .desc{padding:1rem;margin-top:3.5rem;max-width:460px;cursor:pointer}
    .desc-inner{display:flex;align-items:flex-start}
    .desc-q{color:rgba(255,255,255,0.15);font-size:1.2rem;font-family:Georgia,serif;line-height:2rem;flex-shrink:0}
    .desc-text{margin:0.75rem 1rem;line-height:2rem;flex:1}
    .desc-text p:first-child{font-family:'Pacifico',cursive}

    .socials{display:flex;gap:14px;margin-top:1.2rem;padding-left:4px}
    .soc{display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.45);text-decoration:none;transition:color .3s;cursor:pointer;position:relative}
    .soc:hover{color:#fff}
    .soc svg{width:18px;height:18px;fill:currentColor}

    /* QR popup */
    .qr-wrap{position:relative}
    .qr-popup{
      position:absolute;bottom:calc(100% + 12px);left:50%;
      transform:translateX(-50%) scale(0.8);
      width:160px;padding:8px;background:#fff;border-radius:10px;
      box-shadow:0 4px 20px rgba(0,0,0,0.3);
      opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:100;
    }
    .qr-popup img{width:100%;border-radius:6px;display:block}
    .qr-popup::after{content:'';position:absolute;bottom:-6px;left:50%;width:12px;height:12px;background:#fff;border-radius:2px;transform:translateX(-50%) rotate(45deg)}
    .qr-wrap:hover .qr-popup{opacity:1;transform:translateX(-50%) scale(1);pointer-events:auto}

    /* ===== RIGHT ===== */
    .func{display:flex;gap:16px;margin-bottom:16px}
    .func-l,.func-r{flex:1;min-width:0}

    /* Music */
    .music{padding:18px 20px;display:flex;flex-direction:column;gap:10px}
    .mu-top{display:flex;align-items:center;gap:10px}
    .mu-art{width:40px;height:40px;border-radius:8px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;cursor:pointer;transition:background .3s}
    .mu-art:hover{background:rgba(255,255,255,0.14)}
    .mu-info{flex:1;min-width:0}
    .mu-name{font-size:.75rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .mu-artist{font-size:.55rem;color:rgba(255,255,255,0.3);margin-top:1px}
    .mu-bars{display:flex;align-items:flex-end;gap:1.5px;height:16px;margin-left:auto;flex-shrink:0}
    .mu-bars i{display:block;width:2px;border-radius:1px;background:rgba(255,255,255,0.25)}
    .mu-bars i:nth-child(1){height:40%;animation:bar 1.1s 0s ease-in-out infinite paused}
    .mu-bars i:nth-child(2){height:70%;animation:bar 1.1s .1s ease-in-out infinite paused}
    .mu-bars i:nth-child(3){height:50%;animation:bar 1.1s .2s ease-in-out infinite paused}
    .mu-bars i:nth-child(4){height:80%;animation:bar 1.1s .15s ease-in-out infinite paused}
    .mu-bars i:nth-child(5){height:35%;animation:bar 1.1s .25s ease-in-out infinite paused}
    .mu-bars.on i{animation-play-state:running}
    @keyframes bar{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.25)}}
    .mu-prog{width:100%;height:2px;background:rgba(255,255,255,0.06);border-radius:1px;cursor:pointer}
    .mu-prog-bar{height:100%;background:rgba(255,255,255,0.3);border-radius:1px;width:0}
    .mu-time{display:flex;justify-content:space-between;font-size:.48rem;color:rgba(255,255,255,0.2);font-variant-numeric:tabular-nums}

    /* Clock+Weather */
    .tw{padding:20px 22px;display:flex;align-items:center;gap:20px}
    .tw-time{flex:1;text-align:center}
    .tw-time .t{font-size:2.6rem;font-weight:700;letter-spacing:.06em;font-variant-numeric:tabular-nums;line-height:1}
    .tw-time .ts{font-size:.65rem;font-weight:300;color:rgba(255,255,255,0.3);margin-left:2px;vertical-align:super}
    .tw-time .d{font-size:.58rem;color:rgba(255,255,255,0.3);letter-spacing:.08em;margin-top:4px}
    .tw-div{width:1px;height:36px;background:rgba(255,255,255,0.08)}
    .tw-w{display:flex;align-items:center;gap:10px;flex:1}
    .tw-w .wi{font-size:1.4rem}
    .tw-w .wt{font-size:.88rem;font-weight:600}
    .tw-w .wl{font-size:.55rem;color:rgba(255,255,255,0.3);margin-top:1px}

    /* Links */
    .links{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .lk{padding:14px 16px;display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;color:#fff;transition:transform .3s;cursor:pointer}
    .lk:hover{transform:translateY(-3px);background:rgba(255,255,255,0.12)}
    .lk-i{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);flex-shrink:0}
    .lk-n{font-size:.7rem;font-weight:500}

    /* Footer */
    .foot{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:10;font-size:.55rem;color:rgba(255,255,255,0.12);letter-spacing:.04em;display:flex;align-items:center;gap:8px}
    .foot a{color:rgba(255,255,255,0.12);text-decoration:none;transition:color .3s}
    .foot a:hover{color:rgba(255,255,255,0.3)}
    .foot span{color:rgba(255,255,255,0.06)}

    /* ===== Responsive ===== */
    @media(max-width:900px){
      .page{flex-direction:column;overflow-y:auto;padding:20px;gap:16px}
      .left,.right{width:100%;padding:0;margin:0}
      .logo-row img{width:90px}
      .logo-name .big{font-size:3.5rem}
      .logo-name .sm{font-size:1.4rem}
      .desc{margin-top:2rem}
      .func{flex-direction:column}
      .links{grid-template-columns:repeat(3,1fr)}
    }
    @media(max-width:500px){
      .links{grid-template-columns:repeat(2,1fr)}
      .tw-time .t{font-size:1.5rem}
    }
  </style>
</head>

<script>
/* Rain */
!function(){var r=document.getElementById('rain');for(var i=0;i<150;i++){var d=document.createElement('div');d.className='drop';d.style.left=Math.random()*100+'%';d.style.width=(1.5+Math.random()*1.5)+'px';d.style.height=(30+Math.random()*60)+'px';d.style.animationDuration=(.3+Math.random()*.5)+'s';d.style.animationDelay=Math.random()*2+'s';d.style.opacity=.12+Math.random()*.25;r.appendChild(d)}}();

/* Clock */
function tick(){var n=new Date(),h=n.getHours(),m=n.getMinutes(),s=n.getSeconds(),p=function(v){return v<10?'0'+v:v};document.getElementById('tTime').textContent=p(h)+':'+p(m);document.getElementById('tSec').textContent=p(s);var wk=['日','一','二','三','四','五','六'];document.getElementById('tDate').textContent=n.getFullYear()+'.'+p(n.getMonth()+1)+'.'+p(n.getDate())+' 周'+wk[n.getDay()]}
setInterval(tick,1000);tick();

/* Weather */
function loadW(lat,lon){fetch('https://wttr.in/'+lat+','+lon+'?format=j1&lang=zh').then(function(r){return r.json()}).then(function(d){var c=d.current_condition[0],t=c.temp_C,desc=c.lang_zh&&c.lang_zh[0]?c.lang_zh[0].value:c.weatherDesc[0].value,city=d.nearest_area[0].areaName[0].value,code=parseInt(c.weatherCode),icon='🌤';if(code<=113)icon='☀️';else if(code<=119)icon='⛅';else if(code<=122)icon='☁️';else if(code<=143)icon='🌫';else if(code<=200)icon='⛈';else if(code<=263)icon='🌨';else icon='🌧';document.getElementById('wIcon').textContent=icon;document.getElementById('wTemp').textContent=t+'°C';document.getElementById('wLoc').textContent=city+' · '+desc}).catch(function(){document.getElementById('wLoc').textContent='天气获取失败'})}
navigator.geolocation?navigator.geolocation.getCurrentPosition(function(p){loadW(p.coords.latitude,p.coords.longitude)},function(){loadW(29.56,106.55)},{timeout:5e3}):loadW(29.56,106.55);

/* Hitokoto */
function loadH(){fetch('https://v1.hitokoto.cn').then(function(r){return r.json()}).then(function(d){document.getElementById('dTx').textContent=d.hitokoto;document.getElementById('dHi').textContent=d.from?'—— '+d.from:''}).catch(function(){document.getElementById('dTx').textContent='我变强了，也变秃了。';document.getElementById('dHi').textContent='—— 埼玉《一拳超人》'})}
loadH();document.getElementById('desc').addEventListener('click',function(){var h=document.getElementById('dHi'),t=document.getElementById('dTx');gsap.to([h,t],{opacity:0,y:-6,duration:.2,onComplete:function(){loadH();gsap.fromTo([h,t],{opacity:0,y:6},{opacity:1,y:0,duration:.3})}})});

/* Music */
!function(){var a=document.getElementById('audio'),btn=document.getElementById('playBtn'),bars=document.getElementById('bars'),pb=document.getElementById('progBar'),prog=document.getElementById('prog'),cur=document.getElementById('tCur'),dur=document.getElementById('tDur'),playing=false,idx=0,list=[{name:'Clouds',artist:'NF',url:'https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3'},{name:'Inspiring',artist:'TREY',url:'https://cdn.pixabay.com/audio/2022/10/25/audio_540d4f5ab0.mp3'},{name:'Abstract',artist:'Kriztee',url:'https://cdn.pixabay.com/audio/2023/01/17/audio_2e03517a35.mp3'}];function fmt(s){var m=Math.floor(s/60),sc=Math.floor(s%60);return m+':'+(sc<10?'0'+sc:sc)}function load(i){idx=i%list.length;a.src=list[idx].url;document.getElementById('mName').textContent=list[idx].name;document.getElementById('mArtist').textContent=list[idx].artist;pb.style.width='0';cur.textContent='0:00'}load(0);function toggle(){if(playing){a.pause();btn.textContent='▶';bars.classList.remove('on');playing=false}else{a.play();btn.textContent='⏸';bars.classList.add('on');playing=true}}btn.addEventListener('click',toggle);a.addEventListener('timeupdate',function(){if(a.duration){pb.style.width=(a.currentTime/a.duration*100)+'%';cur.textContent=fmt(a.currentTime)}});a.addEventListener('loadedmetadata',function(){dur.textContent=fmt(a.duration)});a.addEventListener('ended',function(){load(idx+1);a.play();btn.textContent='⏸';bars.classList.add('on');playing=true});prog.addEventListener('click',function(e){var r=prog.getBoundingClientRect();if(a.duration)a.currentTime=((e.clientX-r.left)/r.width)*a.duration})}();

/* GSAP */
gsap.set('.logo-row,.desc,.socials,.music,.tw,.lk',{opacity:0,y:18});
var tl=gsap.timeline({defaults:{ease:'power3.out'}});
tl.to('.logo-row',{opacity:1,y:0,duration:.45},.1)
  .to('.desc',{opacity:1,y:0,duration:.45},.22)
  .to('.socials',{opacity:1,y:0,duration:.35},.34)
  .to('.music',{opacity:1,y:0,duration:.45},.15)
  .to('.tw',{opacity:1,y:0,duration:.45},.25)
  .to('.lk',{opacity:1,y:0,duration:.35,stagger:.05},.35);
</script>
</body>
</html>
